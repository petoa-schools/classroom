<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="icon" type="image/x-icon" href="fav_icon2.ico">
    <title>Classroom · Dashboard</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #eef2f6;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
            position: relative;
            z-index: 1;
              background: url('img/templogo1.png') no-repeat center center;
            background-size: 300px 300px;
            opacity: 0.9;
           
        }
       
       
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('img/templogo1.png') no-repeat center center;
            background-size: 300px 300px;
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            background-color: white;
            align-items: center;
            text-align: center;
        }

        /* School logo at the top */
        .school-logo-top {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 3;
        }

        .school-logo-top img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #f5b81b;
        }

        .dashboard-card {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.3);
            overflow: hidden;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .dash-header {
            background: rgb(45,125,45);
            color: white;
            padding: 1.2rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dash-logo {
            background: #f5b81b;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #0b2f4e;
        }

        .welcome-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #cfddee;
            object-fit: cover;
            border: 2px solid white;
        }

        .username-display {
            font-weight: 600;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.15);
            padding: 6px 20px;
            border-radius: 40px;
        }

        .dash-body {
            padding: 30px 30px 40px;
            text-align: center;
        }

        .filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin: 30px 0;
            background: #f8fafd;
            padding: 25px;
            border-radius: 28px;
            justify-content: center;
        }

        .select-block {
            flex: 1 1 160px;
            min-width: 160px;
        }

        .select-block label {
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #2c3e50;
            margin-bottom: 6px;
            display: block;
            text-align: left;
        }

        .select-block select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccd9e6;
            border-radius: 30px;
            background: white;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            text-align: left;
        }

        .password-section {
            background: rgb(50,125,50);/*#fff3e0;*/
            border-radius: 28px;
            padding: 25px;
            margin: 20px 0 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .password-section label {
            font-weight: 600;
            color: red; /*#7b4a1e;*/
        }

        .password-section input {
            flex: 2 1 250px;
            padding: 14px 18px;
            border: none;
            border-radius: 60px;
            background: white;
            border: 1px solid rgb(50,125,50);/*#e6cfb5;*/
            font-size: 1rem;
            max-width: 400px;
        }

        .btn-redirect {
            background: #0b2f4e;
            color: white;
            padding: 14px 36px;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 12px #0b2f4e40;
            white-space: nowrap;
        }

        .btn-redirect:hover {
            background: #1f4b6e;
        }

        .info-note {
            background: #deedff;
            border-radius: 24px;
            padding: 15px 25px;
            font-size: 0.9rem;
            color: #014d7e;
            margin-top: 30px;
            text-align: left;
        }

        .redirect-message {
            margin-top: 10px;
            font-weight: 500;
            min-height: 30px;
            color: #1e4b6e;
            text-align: center;
        }

        hr {
            margin: 30px 0 10px;
            border: 1px dashed #cbd5e1;
        }

        .logout-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Remove duplicate logout button */
        .dashboard-card > .logout-btn:first-of-type {
            display: none;
        }

        /* Center the welcome message */
        .dash-body > div:first-of-type {
            text-align: center;
        }

        .dash-body > p {
            text-align: center;
        }

            .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }
       
        .logo {
            width: 80px;
            height: 80px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-weight: bold;
            color: var(--primary-color);
            border: 2px solid var(--secondary-color);
        }
          .windows-activate {
            text-align: center;
            margin-top: 30px;
            color: var(--text-color);
            font-size: 14px;
            padding: 15px;
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
       
    </style>
</head>
<body oncontextmenu="return false;">
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <!-- School logo at the top -->
          <div class="logo-container">
                <div class="logo">
                    <img src="img/mainlogo.png" alt="School Logo">
                </div>
            </div>

        <div class="dashboard-card">
            <div class="dash-header">
                <div class="header-left">
                    <div class="dash-logo"><i class="fas fa-microchip"></i></div>
                    <div style="font-size:1.5rem; font-weight:600;">PETOA SCHOOLS CLASSROOM DASHBOARD</div>
                </div>
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="welcome-row" id="userWelcome">
                        <!-- Dynamic user content will be inserted here -->
                    </div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            
            <div class="dash-body">
                <div style="font-size:1.8rem; font-weight:300; margin-bottom:10px;">👋 Welcome, <span id="welcomeUsername"></span></div>
                <p style="color:#2d4a6e;">Select term, session, class, subject and week, then enter the week password.</p>

                <div class="filter-grid">
                    <div class="select-block">
                        <label>📆 Session</label>
                        <select id="sessionSelect">
                            <option value="2025-2026">2025-2026</option>
                            <option value="2026-2027">2026-2027</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>📚 Class</label>
                        <select id="classSelect">
                            <option value="JSS1">JSS1</option>
                            <option value="JSS2">JSS2</option>
                            <option value="JSS3">JSS3</option>
                            <option value="SS1">SS1</option>
                            <option value="SS2">SS2</option>
                            <option value="SS3">SS3</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>📝 Term</label>
                        <select id="termSelect">
                            <option value="First_Term">First Term</option>
                            <option value="Second_Term">Second Term</option>
                            <option value="Third_Term">Third Term</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>🧪 Subject</label>
                        <select id="subjectSelect">
                            <option value="Mathematics">Mathematics</option>
                            <option value="English Language">English Language</option>
                            <option value="Computer Studies">Computer Studies</option>
                            <option value="Digital Technology">Digital Technology</option>
                        </select>
                    </div>
                    <div class="select-block">
                        <label>📅 Week</label>
                        <select id="weekSelect">
                            <!-- Weeks 1-14 will be populated by JavaScript -->
                        </select>
                    </div>
                </div>

                <div class="password-section">
                    <label for="weekPass"><i class="fas fa-key"></i> week password:</label>
                    <input type="password" id="weekPassInput" placeholder="enter password for selected week / class...">
                    <button class="btn-redirect" id="redirectBtn"><i class="fas fa-arrow-right"></i> Go to lesson page</button>
                </div>

                <div id="redirectMessage" class="redirect-message"></div>
                
                <hr>
                <!--<div class="info-note">
                    <i class="fas fa-info-circle"></i> Static demo: week password examples: "math3" for Mathematics week3, "digi1" for Digital Tech week1, "comp7" for Computer Studies week7, etc. <br>
                    <strong>Test:</strong> 2025-2026, JSS1, First_Term, Digital Technology, Week1 → password "digi1" → redirects to 2025-2026_JSS1_First_Term_Digital_Technology_Week1_Class.html
                </div>-->

                    <div class="windows-activate">
                        <p>&copy; 2026 petoa-schools classroom</p>
                    </div>
            </div>
        </div>
    </div>

    <script>
        // ---------- STATIC PASSWORD MAP ----------
        const weekPasswordMap = new Map();

        // Generate all combinations - UPDATED with hyphen in sessions
        const sessions = ['2025-2026', '2026-2027'];
        const classes = ['JSS1', 'JSS2', 'JSS3', 'SS1', 'SS2', 'SS3'];
        const terms = ['First_Term', 'Second_Term', 'Third_Term'];
        const subjects = ['Mathematics', 'English Language', 'Computer Studies', 'Digital Technology'];

        // Populate password map
        sessions.forEach(s => {
            classes.forEach(c => {
                terms.forEach(t => {
                    subjects.forEach(sub => {
                        for (let w = 1; w <= 14; w++) {
                            let mapKey = `${s}_${c}_${t}_${sub}_Week${w}`;
                            let simplePass = '';
                            if (sub === 'Mathematics') simplePass = `math${w}`;
                            else if (sub === 'English Language') simplePass = `eng${w}`;
                            else if (sub === 'Computer Studies') simplePass = `comp${w}`;
                            else if (sub === 'Digital Technology') simplePass = `digi${w}`;
                            weekPasswordMap.set(mapKey, simplePass);
                        }
                    });
                });
            });
        });

        // ---------- CHECK LOGIN SESSION ----------
        const loggedUser = JSON.parse(sessionStorage.getItem('loggedUser'));
        
        // Redirect to login if no user found
        if (!loggedUser) {
            window.location.href = 'index.html';
        }

        // ---------- POPULATE USER INFO ----------
        const welcomeRow = document.getElementById('userWelcome');
        const welcomeUsername = document.getElementById('welcomeUsername');
        
        welcomeUsername.textContent = loggedUser.username;
        welcomeRow.innerHTML = `
            <span class="username-display"><i class="far fa-smile"></i> ${loggedUser.username}</span>
            <img src="img/${loggedUser.image}" alt="user" class="user-img" onerror="this.src='https://via.placeholder.com/48?text=User';">
        `;

        // ---------- POPULATE WEEK SELECT (1-14) ----------
        const weekSelect = document.getElementById('weekSelect');
        for (let i = 1; i <= 14; i++) {
            const option = document.createElement('option');
            option.value = `Week${i}`;
            option.textContent = `Week ${i}`;
            weekSelect.appendChild(option);
        }

        // ---------- DASHBOARD EVENT LISTENERS ----------
        const redirectBtn = document.getElementById('redirectBtn');
        const sessionSel = document.getElementById('sessionSelect');
        const classSel = document.getElementById('classSelect');
        const termSel = document.getElementById('termSelect');
        const subjectSel = document.getElementById('subjectSelect');
        const weekSel = document.getElementById('weekSelect');
        const passInput = document.getElementById('weekPassInput');
        const msgDiv = document.getElementById('redirectMessage');

        // Prefill password function
        function prefillTestPassword() {
            const session = sessionSel.value;
            const className = classSel.value;
            const term = termSel.value;
            const subject = subjectSel.value;
            const week = weekSel.value;
            const key = `${session}_${className}_${term}_${subject}_${week}`;
            const pass = weekPasswordMap.get(key);
            if (pass && passInput) {
                passInput.value = pass;
            }
        }

        // Redirect button click handler
        redirectBtn.addEventListener('click', function() {
            const session = sessionSel.value;
            const className = classSel.value;
            const term = termSel.value;
            const subject = subjectSel.value;
            const week = weekSel.value;

            const mapKey = `${session}_${className}_${term}_${subject}_${week}`;
            const expectedPassword = weekPasswordMap.get(mapKey);
            const enteredPass = passInput.value.trim();

            if (!expectedPassword) {
                msgDiv.innerHTML = '⚠️ No password defined for this combination.';
                return;
            }

            if (enteredPass !== expectedPassword) {
                msgDiv.innerHTML = '❌ Incorrect week password. Try again.';
                return;
            }

            // Build redirect URL with underscore for spaces in subject
            const subjectForUrl = subject.replace(/ /g, '_');
            const redirectUrl = `${session}_${className}_${term}_${subjectForUrl}_${week}_Class.html`;
            
            msgDiv.innerHTML = `✅ Access granted! Redirecting to <strong>${redirectUrl}</strong> ...`;

            // Store current selections in sessionStorage for the class page to use
            sessionStorage.setItem('currentClass', JSON.stringify({
                session: session,
                className: className,
                term: term,
                subject: subject,
                week: week,
                redirectUrl: redirectUrl
            }));

            // Redirect to the class page
            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 800);
        });

        // Prefill password when selections change
        [sessionSel, classSel, termSel, subjectSel, weekSel].forEach(el => {
            el.addEventListener('change', prefillTestPassword);
        });

        // Initial prefill
        setTimeout(prefillTestPassword, 100);

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', function() {
            sessionStorage.removeItem('loggedUser');
            sessionStorage.removeItem('currentClass');
            window.location.href = 'index.html';
        });

         // ================== ANTI-CHEAT & LOGOUT ==================
        document.addEventListener('keydown', function (event) {
            const key = event.key.toLowerCase();
            if ((event.ctrlKey && (key === 'p' || key === 's')) && currentSection === 'objectives') {
                event.preventDefault();
                alert("Right-click and view source are disabled during examination.");
                return false;
            }
        });
       
        document.addEventListener('contextmenu', (event) => {
            event.preventDefault();
            alert("Right-click is disabled during examination.");
        });
       
        document.addEventListener('keydown', function (e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') ||
                (e.ctrlKey && e.shiftKey && e.key === 'J') || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                alert("Developer tools are disabled during examination.");
            }
        });
    </script>
</body>
</html>
