        const errorDiv = document.getElementById('login-error');

        loginBtn.addEventListener('click', function() {
            const username = usernameInp.value.trim();
            const password = passwordInp.value.trim();

            const foundUser = validUsers.find(u => u.username === username && u.password === password);

            if (foundUser) {
                // Store user data in sessionStorage for dashboard to access
                sessionStorage.setItem('loggedUser', JSON.stringify(foundUser));
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.style.display = 'block';
            }
        });

        // Enter key support
        passwordInp.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });


         // ================== ANTI-CHEAT & LOGOUT ==================
