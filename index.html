<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Lab Portal · Login</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1581092921461-39b9c1e4fdd0?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            padding: 2rem 2rem 2.5rem;
            border-radius: 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 20, 30, 0.4);
            margin: 20px;
            border: 1px solid rgba(255,255,240,0.6);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            background: #0b2f4e;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: white;
            font-size: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .school-name {
            font-weight: 600;
            font-size: 1.5rem;
            color: #0b2f4e;
            letter-spacing: 0.5px;
        }

        .school-motto {
            font-size: 0.8rem;
            color: #2c3e50;
            opacity: 0.8;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1e293b;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: none;
            border-radius: 40px;
            background: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            font-size: 1rem;
            outline: 1px solid transparent;
            transition: 0.2s;
        }

        .input-group input:focus {
            outline: 2px solid #0b2f4e;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            background: #0b2f4e;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
            box-shadow: 0 8px 16px -6px #0b2f4e80;
        }

        .btn-login:hover {
            background: #154b6e;
        }

        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo"><i class="fas fa-flask"></i></div>
            <div class="school-name">Springfield High</div>
            <div class="school-motto">computer laboratory · technology hub</div>
        </div>

        <div class="input-group">
            <label><i class="far fa-user" style="margin-right:6px;"></i> Username</label>
            <input type="text" id="login-username" placeholder="e.g., lab.teacher" value="labtech">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock" style="margin-right:8px;"></i> Password</label>
            <input type="password" id="login-password" placeholder="••••••••" value="lab123">
        </div>

        <button class="btn-login" id="login-btn"><i class="fas fa-arrow-right-to-bracket" style="margin-right:8px;"></i> Access dashboard</button>

        <div id="login-error" class="error-message" style="display: none;">Invalid credentials</div>
        <div style="margin-top: 20px; font-size:0.8rem; text-align:center; color:#334155;">static demo: labtech / lab123 • admin / admin456</div>
    </div>

    <script>
        // ---------- STATIC ARRAY OF USERNAMES AND PASSWORDS ----------
        const validUsers = [
            { username: 'labtech', password: 'lab123', image: 'user1.png' },
            { username: 'admin', password: 'admin', image: 'admin.png' },
            { username: 'tech.mary', password: 'mary2025', image: 'mary.jpg' },
            { username: 'mr.udoh', password: 'udoh2026', image: 'udoh.png' }
        ];

        const loginBtn = document.getElementById('login-btn');
        const usernameInp = document.getElementById('login-username');
        const passwordInp = document.getElementById('login-password');
        const errorDiv = document.getElementById('login-error');

        loginBtn.addEventListener('click', function() {
            const username = usernameInp.value.trim();
            const password = passwordInp.value.trim();

            const foundUser = validUsers.find(u => u.username === username && u.password === password);

            if (foundUser) {
                // Store user data in sessionStorage for dashboard to access
                sessionStorage.setItem('loggedUser', JSON.stringify(foundUser));
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                errorDiv.style.display = 'block';
            }
        });

        // Enter key support
        passwordInp.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });
    </script>
</body>
</html>
